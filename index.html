<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>研究方法與分析程序互動導覽</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fdfaf7; color: #4a3f35; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-active { border-bottom: 3px solid #c08457; color: #c08457; }
        .text-primary { color: #8c6a5a; }
        .bg-primary { background-color: #8c6a5a; }
    </style>
</head>
<body class="antialiased">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-primary">
        <div class="max-w-6xl mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center">
            <h1 class="text-xl font-bold text-primary mb-4 md:mb-0">研究方法論互動導覽</h1>
            <div class="flex flex-wrap justify-center gap-4 md:space-x-6 text-sm font-medium">
                <button onclick="switchTab('overview')" class="nav-link nav-active" id="nav-overview">研究取向</button>
                <button onclick="switchTab('analysis')" class="nav-link" id="nav-analysis">分析程序</button>
                <button onclick="switchTab('ai-coding')" class="nav-link text-amber-600 font-bold" id="nav-ai-coding">✨ AI 編碼實作</button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-12">
        <!-- 概覽區 -->
        <section id="overview" class="tab-content active">
            <h2 class="text-3xl font-bold text-primary mb-6">研究取向</h2>
            <p>這是您原本的研究概覽內容...</p>
        </section>

        <!-- 分析程序區 -->
        <section id="analysis" class="tab-content">
            <h2 class="text-3xl font-bold text-primary mb-6">分析程序</h2>
            <p>這是您原本的分析程序內容...</p>
        </section>

        <!-- AI 編碼實作區 -->
        <section id="ai-coding" class="tab-content">
            <div class="mb-8 text-center">
                <h2 class="text-2xl font-bold text-gray-800 mb-4">✨ AI 質性研究助理</h2>
                <p class="text-gray-600 max-w-2xl mx-auto text-sm">請貼上文本，AI 將自動進行初始編碼與判斷分析。</p>
            </div>

            <div class="max-w-3xl mx-auto bg-white border border-gray-300 rounded-2xl p-8 shadow-sm">
                <textarea id="ai-text-input" rows="6" class="w-full p-4 border border-gray-200 rounded-xl mb-4 bg-gray-50" placeholder="請在此貼上分析文本..."></textarea>
                <button onclick="submitToAI()" id="ai-submit-btn" class="w-full bg-primary hover:bg-[#7a5b4c] text-white py-3 rounded-xl transition-all font-bold text-lg">
                    🚀 開始 AI 分析
                </button>
                
                <div id="ai-result-output" class="mt-8 p-6 bg-amber-50 rounded-xl border border-amber-200 text-gray-800 leading-relaxed min-h-[100px] hidden">
                </div>
            </div>
        </section>
    </main>

    <script>
        // 設定您的 GAS 網址
        const GAS_URL = "https://script.google.com/macros/s/AKfycbx_XWjSZ3mqgM8POx-yGmXJ0I9rObD3alXtxxvldnYz6krRHuxzFUI5JJ70Vbx7JUW8/exec";

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('nav-active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('nav-' + tabId).classList.add('nav-active');
        }

        async function submitToAI() {
            const input = document.getElementById('ai-text-input').value;
            const outputDiv = document.getElementById('ai-result-output');
            const btn = document.getElementById('ai-submit-btn');

            if (!input) { alert("請輸入文本！"); return; }

            outputDiv.classList.remove('hidden');
            outputDiv.innerHTML = "🤖 AI 正在分析中...";
            btn.disabled = true;

            try {
                // 修改為 cors 模式，確保能正確取得回應
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'cors', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: input })
                });

                const data = await response.json();
                if (data.success) {
                    outputDiv.innerHTML = `<h4 class="font-bold mb-2">分析結果：</h4>` + data.reply.replace(/\n/g, '<br>');
                } else {
                    outputDiv.innerHTML = "❌ 發生錯誤：" + data.error;
                }
            } catch (err) {
                outputDiv.innerHTML = "❌ 連線失敗，請確保 GAS 已部署為「所有人」。錯誤：" + err;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
