<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>研究方法論互動導覽</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-active { border-bottom: 3px solid #c08457; color: #c08457; }
    </style>
</head>
<body class="bg-[#fdfaf7] text-[#4a3f35] antialiased">
    <nav class="sticky top-0 bg-white/80 backdrop-blur-md border-b border-primary p-6">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">研究方法論互動導覽</h1>
            <div class="flex gap-4">
                <button onclick="switchTab('overview')" class="nav-link nav-active" id="nav-overview">研究取向</button>
                <button onclick="switchTab('ai-coding')" class="nav-link text-amber-600 font-bold" id="nav-ai-coding">✨ AI 編碼實作</button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-12">
        <section id="overview" class="tab-content active">
            <h2 class="text-3xl font-bold mb-6">研究取向</h2>
            <p>請將您原本的導覽內容放在這裡...</p>
        </section>

        <section id="ai-coding" class="tab-content">
            <div class="max-w-3xl mx-auto bg-white p-8 rounded-2xl shadow-sm border">
                <textarea id="ai-text-input" rows="6" class="w-full p-4 border rounded-xl mb-4 bg-gray-50" placeholder="貼上文本..."></textarea>
                <button onclick="submitToAI()" id="ai-submit-btn" class="w-full bg-[#8c6a5a] text-white py-3 rounded-xl font-bold">🚀 開始 AI 分析</button>
                <div id="ai-result-output" class="mt-8 p-6 bg-amber-50 rounded-xl hidden"></div>
            </div>
        </section>
    </main>

    <script>
        // 請將您從 Google Apps Script 拿到的網址貼在這裡
        const GAS_URL = "https://script.google.com/macros/s/AKfycbx_XWjSZ3mqgM8POx-yGmXJ0I9rObD3alXtxxvldnYz6krRHuxzFUI5JJ70Vbx7JUW8/exec";

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function submitToAI() {
            const outputDiv = document.getElementById('ai-result-output');
            const input = document.getElementById('ai-text-input').value;
            outputDiv.innerHTML = "🤖 分析中...";
            outputDiv.classList.remove('hidden');

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'cors',
                    body: JSON.stringify({ text: input })
                });
                const data = await response.json();
                outputDiv.innerHTML = data.reply.replace(/\n/g, '<br>');
            } catch (err) {
                outputDiv.innerHTML = "❌ 連線錯誤，請確認 GAS 是否部署。";
            }
        }
    </script>
</body>
</html>
